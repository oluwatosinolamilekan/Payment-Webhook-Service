stages:
  - test
  - build
  - deploy

variables:
  NODE_IMAGE: node:20-alpine
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE
  POSTGRES_DB: payment_webhooks_test
  POSTGRES_USER: pay4x
  POSTGRES_PASSWORD: test_password

# ---- Test Stage ----
test:
  stage: test
  image: $NODE_IMAGE
  services:
    - postgres:16-alpine
    - redis:7-alpine
  variables:
    DB_HOST: postgres
    REDIS_HOST: redis
    NODE_ENV: test
  before_script:
    - npm ci
  script:
    - npm run lint || true
    - npm test
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      junit: coverage/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    when: always

# ---- Build Stage ----
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE:$CI_COMMIT_SHA -t $DOCKER_IMAGE:latest .
    - docker build -t $DOCKER_IMAGE:worker-$CI_COMMIT_SHA -f Dockerfile.worker .
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHA
    - docker push $DOCKER_IMAGE:latest
    - docker push $DOCKER_IMAGE:worker-$CI_COMMIT_SHA
  only:
    - main
    - tags

# ---- Deploy Staging ----
deploy_staging:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
  script:
    - echo "Deploying to staging..."
    - ssh $STAGING_HOST "cd /opt/pay4x && docker-compose pull && docker-compose up -d"
  environment:
    name: staging
    url: https://staging-api.pay4x.com
  only:
    - main

# ---- Deploy Production ----
deploy_production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
  script:
    - echo "Deploying to production..."
    - ssh $PRODUCTION_HOST "cd /opt/pay4x && docker-compose pull && docker-compose up -d --no-recreate"
  environment:
    name: production
    url: https://api.pay4x.com
  only:
    - tags
  when: manual
